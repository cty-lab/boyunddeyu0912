<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮座位查詢</title>
    <style>
        /* === 關鍵修正：確保寬度計算不會溢出，解決跑版問題 === */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        /* ================================================= */

        /* CSS 樣式：主題顏色與字體設定 */
        :root {
            --color-light-green: #CDE9B9;
            --color-dark-blue-gray: #6B7C95;
            --color-dark-green: #7D8E6F;
            --color-light-orange: #F2C3A7;
            --color-background-main: #F9F7F0;
            --color-text-dark: #333333;
            --color-text-light: #FFFFFF;
            --color-button-bg: var(--color-dark-green);
            --color-input-border: #B7C3D0; 
            --color-highlight-name: var(--color-dark-blue-gray);
            --color-result-found-bg: var(--color-light-green);
            --color-result-found-text: var(--color-dark-green);
        }

        /* === Body 採用 Flexbox 佈局：確保內容水平居中 === */
        body { 
            font-family: '微軟正黑體', 'Arial', sans-serif;
            margin: 0; 
            background-color: var(--color-background-main);
            color: var(--color-text-dark);
            /* 移除 overflow-x: hidden; 以防 Flexbox 被錯誤影響，讓 Flexbox 自行處理 */
            min-height: 100vh; 
            display: flex;
            justify-content: center; /* 水平居中 */
            align-items: flex-start;
            text-align: initial; 
        }

        /* 內容包裝器：Flexbox 會將這個 div 放在畫面中央 */
        #app-wrapper {
            width: 100%;
            max-width: 500px;
            padding: 20px 10px; 
            text-align: center; 
        }

        h1 { 
            color: var(--color-dark-blue-gray);
            margin-bottom: 40px;
            font-size: 2.16em; 
        }
        
        /* 輸入欄位：確保置中 */
        input[type="text"] { 
            padding: 16px; 
            margin: 0 auto 25px auto; 
            display: block; 
            width: 90%; 
            max-width: 368px; 
            border: 2px solid var(--color-input-border);
            border-radius: 8px; 
            font-size: 1.25em; 
            outline: none;
        }
        
        button { 
            padding: 16px 35px; 
            background-color: var(--color-button-bg);
            color: var(--color-text-light);
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-size: 1.25em; 
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover:not(:disabled) { 
            background-color: #5D7A5B;
            transform: translateY(-2px);
        }
        button:disabled { 
            background-color: #AABFA9;
            cursor: wait;
        }
        
        /* === 圖片樣式：確保置中並響應式 === */
        .wedding-design-image {
    max-width: 100%;        /* 手機版撐滿寬度 */
    width: min(120%, 600px); /* 桌機版放大到原來 1.5 倍，最大不超過 600px */
    height: auto;
    margin: 40px auto 20px auto;
    display: block;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

@media (max-width: 768px) {
    .wedding-design-image {
        width: 100%;        /* 手機版直接撐滿 */
        max-width: 100%;
    }
}
        
        /* === 結果框：使用 margin: auto 置中，內部文字靠左 === */
        #result { 
            margin: 30px auto 0 auto; 
            padding: 25px;
            border: 2px solid #DCE0E6;
            border-radius: 12px;
            display: block; 
            width: 90%; 
            max-width: 400px;
            font-size: 1.2em;
            line-height: 1.6;
            background-color: var(--color-background-main);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: left; /* 保持框內文字靠左對齊 */
        }
        
        .found { background-color: var(--color-result-found-bg); color: var(--color-result-found-text); border-color: var(--color-result-found-text); } 
        .notFound { background-color: var(--color-light-orange); color: #CC0000; border-color: #CC0000; } 
        .guest-name-highlight { color: var(--color-dark-blue-gray); font-weight: bold; }

        /* === 媒體查詢：手機版圖片放大優化 === */
        @media (max-width: 768px) {
            .wedding-design-image {
                max-width: 100%; 
            }
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <h1>蘇柏瑜與張德妤的婚禮</h1>
        <input type="text" id="guestName" placeholder="請輸入姓名或稱謂">
        
        <button onclick="searchSeat()" id="searchButton">查詢座位</button>
        
        <div id="result">
            在這裡輸入姓名，查詢您的座位。
        </div>

        <img src="婚禮座位表.jpg" alt="婚禮設計主題圖片" class="wedding-design-image">
    </div>
    <script>
        // 【⭐ Google Sheets 連動：最終正確連結 ⭐】
        const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGD48WcMcPGkukcJyKEkA6vyl9TRBggoT0cAYqnXEDqqca1yftj9CFK1ChywRAng/pub?output=csv'; 
        
        let g_seatingChart = []; 

        async function loadSeatingChart() {
            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const csvText = await response.text();
                
                const rows = csvText.split('\n').slice(1);
                
                return rows.map(row => {
                    const columns = row.split(',');
                    const name = columns[0] ? columns[0].trim() : ''; 
                    const table = columns[1] ? columns[1].trim() : '';
                    const alias = columns[2] ? columns[2].trim() : '';

                    if (name && table) {
                        return { name: name, table: table, alias: alias };
                    }
                }).filter(item => item !== undefined);
                
            } catch (error) {
                document.getElementById("result").innerHTML = "🚨 資料載入失敗，請檢查網路或 Google Sheets 連結。";
                document.getElementById("result").className = "notFound";
                return []; 
            }
        }

        async function initApp() {
            const resultDiv = document.getElementById("result");
            const searchButton = document.getElementById("searchButton");
            
            searchButton.disabled = true;
            resultDiv.innerHTML = "載入賓客名單中，請稍候..."; 
            resultDiv.className = "";

            g_seatingChart = await loadSeatingChart(); 

            if (g_seatingChart.length > 0) {
                searchButton.disabled = false;
                resultDiv.innerHTML = "在這裡輸入姓名，查詢您的座位。"; 
            } else {
                searchButton.disabled = true;
                resultDiv.innerHTML = "🚨 內部錯誤：資料載入失敗，請稍後再試。";
                resultDiv.className = "notFound";
            }
        }
        
        function searchSeat() {
            const guestNameInput = document.getElementById("guestName").value;
            const cleanedName = guestNameInput.trim(); 

            const resultDiv = document.getElementById("result");

            resultDiv.style.display = 'inline-block';

            if (cleanedName === "") {
                resultDiv.innerHTML = "嗨嗨~請輸入本名或稱謂才能找到你喔！";
                resultDiv.className = "notFound";
                return;
            }
            
            const searchKey = cleanedName.toLowerCase();

            const foundGuest = g_seatingChart.find(guest => 
                guest.name.toLowerCase() === searchKey ||
                guest.alias.toLowerCase().includes(searchKey)
            );

            if (foundGuest) {
                resultDiv.innerHTML = `<span class="guest-name-highlight">${foundGuest.name}</span>，歡迎來到我們的婚禮❤️<br>您的桌號是：<strong>${foundGuest.table}</strong>`;
                resultDiv.className = "found";
            } else {
                resultDiv.innerHTML = "嗨嗨~請輸入本名或稱謂才能找到你喔！";
                resultDiv.className = "notFound";
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
